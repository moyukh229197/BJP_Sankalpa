name: Auto Update News Data

on:
  schedule:
    # Runs every 3 hours (at minute 0)
    - cron: '0 */3 * * *'
  
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we fetch the full history so we can push back
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Run Auto-Updater Script
        run: npm run update
        env:
          # This pulls the GEMINI_API_KEY from your GitHub repository secrets if you set it up
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-update news data [skip ci]'
          file_pattern: 'data/*.json'
          branch: main
